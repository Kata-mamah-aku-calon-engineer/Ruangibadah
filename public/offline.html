<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuangIbadah — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #fff;
        }
        p {
            font-size: 14px;
            color: #a3a3a3;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        button {
            background: #006FEE;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #005bc4; }
        .subtitle {
            font-size: 12px;
            color: #525252;
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🕌</div>
        <h1>Tidak Ada Koneksi Internet</h1>
        <p>
            Sepertinya perangkat Anda sedang offline. 
            Periksa koneksi internet Anda dan coba lagi.
        </p>
        <button onclick="window.location.reload()">Coba Lagi</button>
        <p class="subtitle">RuangIbadah — Platform Ibadah Harian</p>
    </div>
</body>
</html>
